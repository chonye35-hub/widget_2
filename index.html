<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Aero D-Day</title>

<style>
body {
  margin: 0;
  background: transparent;
  font-family: "Segoe UI", "Nunito", sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  overflow: hidden;
}

/* 🌫 공기 레이어 */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background:
    radial-gradient(circle at 20% 30%, rgba(242,198,207,0.25), transparent 55%),
    radial-gradient(circle at 80% 70%, rgba(183,201,226,0.25), transparent 55%);
  z-index: -2;
}

/* 💎 카드 */
.card {
  width: 260px;
  padding: 30px 20px;
  border-radius: 32px;

  background: linear-gradient(
    135deg,
    rgba(242,198,207,0.55),
    rgba(183,201,226,0.55)
  );

  backdrop-filter: blur(18px);
  -webkit-backdrop-filter: blur(18px);

  border: 1px solid rgba(255,255,255,0.8);

  box-shadow:
    0 25px 50px rgba(183,201,226,0.35),
    0 0 80px rgba(242,198,207,0.15),
    inset 0 3px 10px rgba(255,255,255,0.9);

  text-align: center;
  position: relative;
  overflow: hidden;

  animation: float 6s ease-in-out infinite;
}

/* ✨ 상단 유광 */
.card::after {
  content: "";
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 50%;
  background: linear-gradient(
    to bottom,
    rgba(255,255,255,0.75),
    transparent
  );
  border-radius: 32px 32px 60% 60%;
  pointer-events: none;
}

/* 제목 */
h2 {
  margin: 0;
  font-size: 15px;
  font-weight: 500;
  color: #5f6f86;
  letter-spacing: 1px;
}

/* 숫자 */
#result {
  margin-top: 20px;
  font-size: 34px;
  font-weight: 600;
  color: #4f5d73;
  text-shadow:
    0 2px 6px rgba(255,255,255,0.8),
    0 0 20px rgba(183,201,226,0.4);
}

/* 버튼 */
button {
  margin-top: 22px;
  padding: 6px 14px;
  border-radius: 18px;
  border: none;
  background: rgba(255,255,255,0.8);
  color: #4f5d73;
  font-size: 12px;
  cursor: pointer;
  transition: 0.25s ease;
  box-shadow:
    0 5px 15px rgba(183,201,226,0.3),
    inset 0 1px 3px rgba(255,255,255,0.9);
}

button:hover {
  transform: translateY(-2px);
  background: rgba(255,255,255,0.95);
}

/* 🌊 부유 애니메이션 */
@keyframes float {
  0% { transform: translateY(0px); }
  50% { transform: translateY(-6px); }
  100% { transform: translateY(0px); }
}
</style>
</head>

<body>

<div class="card">
  <h2 id="title">D-Day</h2>
  <div id="result">계산중...</div>
  <button onclick="toggleMode()">mode</button>
</div>

<script>
function getParams() {
  const urlParams = new URLSearchParams(window.location.search);
  return {
    date: urlParams.get("date"),
    mode: urlParams.get("mode") || "d",
    title: urlParams.get("title") || "D-Day"
  };
}

let { date, mode, title } = getParams();
document.getElementById("title").innerText = title;

function calculate() {
  if (!date) return;

  const today = new Date();
  today.setHours(0,0,0,0);

  const target = new Date(
    date.substring(0,4),
    date.substring(4,6)-1,
    date.substring(6,8)
  );
  target.setHours(0,0,0,0);

  const diffTime = target - today;
  const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));

  let text;

  if (mode === "d") {
    if (diffDays > 0) text = `D-${diffDays}`;
    else if (diffDays === 0) text = "D-Day";
    else text = `D+${Math.abs(diffDays)}`;
  } else {
    const countDays = Math.floor((today - target) / (1000*60*60*24)) + 1;
    text = `${countDays}일째`;
  }

  document.getElementById("result").innerText = text;
}

function toggleMode() {
  mode = mode === "d" ? "count" : "d";
  calculate();
}

calculate();
</script>

</body>
</html>
