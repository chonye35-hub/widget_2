<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Aero Dot D-Day</title>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  background: #ffffff; /* 완전 흰색 */
  font-family: "Segoe UI", sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* 카드 */
.card {
  width: 260px;
  padding: 30px 20px;
  border-radius: 32px;

  background: linear-gradient(
    135deg,
    rgba(242,198,207,0.45),
    rgba(183,201,226,0.45)
  );

  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);

  border: 1px solid rgba(255,255,255,0.9);

  box-shadow:
    0 20px 40px rgba(183,201,226,0.25),
    inset 0 3px 10px rgba(255,255,255,0.9);

  text-align: center;
  position: relative;
  overflow: hidden;

  animation: float 6s ease-in-out infinite;
}

/* 유광 */
.card::after {
  content: "";
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 50%;
  background: linear-gradient(
    to bottom,
    rgba(255,255,255,0.7),
    transparent
  );
  border-radius: 32px 32px 60% 60%;
}

/* 제목 */
h2 {
  margin: 0;
  font-size: 14px;
  font-weight: 500;
  color: #5f6f86;
  letter-spacing: 1px;
}

/* 도트 숫자 */
#result {
  margin-top: 24px;
  font-family: 'Press Start 2P', monospace;
  font-size: 22px;
  color: #4f5d73;
  text-shadow:
    0 2px 6px rgba(255,255,255,0.8);
}

/* 버튼 */
button {
  margin-top: 24px;
  padding: 8px 12px;
  border-radius: 16px;
  border: none;
  background: rgba(255,255,255,0.9);
  color: #4f5d73;
  font-family: 'Press Start 2P', monospace;
  font-size: 9px;
  cursor: pointer;
  transition: 0.2s ease;
  box-shadow:
    0 5px 15px rgba(183,201,226,0.2),
    inset 0 1px 3px rgba(255,255,255,0.9);
}

button:hover {
  transform: translateY(-2px);
}

/* 부유 */
@keyframes float {
  0% { transform: translateY(0px); }
  50% { transform: translateY(-6px); }
  100% { transform: translateY(0px); }
}
</style>
</head>

<body>

<div class="card">
  <h2 id="title">D-Day</h2>
  <div id="result">계산중...</div>
  <button onclick="toggleMode()">MODE</button>
</div>

<script>
function getParams() {
  const urlParams = new URLSearchParams(window.location.search);
  return {
    date: urlParams.get("date"),
    title: urlParams.get("title") || "D-Day"
  };
}

let { date, title } = getParams();
document.getElementById("title").innerText = title;

/* 🔥 모드 저장/불러오기 */
let mode = localStorage.getItem("ddayMode") || "count";

function calculate() {
  if (!date) return;

  const today = new Date();
  today.setHours(0,0,0,0);

  const target = new Date(
    date.substring(0,4),
    date.substring(4,6)-1,
    date.substring(6,8)
  );
  target.setHours(0,0,0,0);

  const diffTime = target - today;
  const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));

  let text;

  if (mode === "d") {
    if (diffDays > 0) text = `D-${diffDays}`;
    else if (diffDays === 0) text = "D-DAY";
    else text = `D+${Math.abs(diffDays)}`;
  } else {
    const countDays = Math.floor((today - target) / (1000*60*60*24)) + 1;
    text = `${countDays}DAY`;
  }

  document.getElementById("result").innerText = text;
}

function toggleMode() {
  mode = mode === "d" ? "count" : "d";
  localStorage.setItem("ddayMode", mode); // 저장
  calculate();
}

calculate();
</script>

</body>
</html>
